name: CI — VerdaTraceAI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────
  # Secret Scan
  # ─────────────────────────────────────────
  secret-scan:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────
  # Backend Quality Gates
  # ─────────────────────────────────────────
  backend:
    name: Backend — Lint / Security / Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: Ruff lint check
        run: python -m ruff check .

      - name: Ruff format check
        run: python -m ruff format --check .

      - name: Bandit security scan
        run: python -m bandit -r app/ -x tests/ -ll

      - name: Run pytest
        env:
          GCP_PROJECT_ID: test-project
          VERTEX_REGION: us-central1
          LLM_PROVIDER: vertex-ai
          USE_ALLOYDB: "False"
        run: |
          python -m pytest tests/ -v \
            --cov=app \
            --cov-report=term-missing \
            --cov-fail-under=60

      - name: npm audit (backend node deps)
        run: |
          if [ -f "package.json" ]; then npm audit --audit-level moderate; fi
        continue-on-error: true

  # ─────────────────────────────────────────
  # Frontend Quality Gates
  # ─────────────────────────────────────────
  frontend:
    name: Frontend — TypeScript Build / Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript build (type-check gate)
        run: npm run build

      - name: npm audit
        run: npm audit --audit-level moderate
        continue-on-error: true

  # ─────────────────────────────────────────
  # Status Summary
  # ─────────────────────────────────────────
  ci-success:
    name: CI Passed
    needs: [secret-scan, backend, frontend]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.secret-scan.result }}" == "failure" || \
                "${{ needs.backend.result }}" == "failure" || \
                "${{ needs.frontend.result }}" == "failure" ]]; then
            echo "One or more CI jobs failed."
            exit 1
          fi
          echo "All CI gates passed."
